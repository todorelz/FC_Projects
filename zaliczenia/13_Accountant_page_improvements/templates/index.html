<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System firmy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📊 System zarządzania firmą</h1>

<div class="panel">
    <h2>Saldo: {{ data.saldo }} zł</h2>

    <h3>Magazyn:</h3>
    <ul>
        {% for item, qty in data.magazyn.items() %}
            <li>{{ item }} - {{ qty }} szt.</li>
        {% endfor %}
    </ul>
</div>

<div class="forms">

    <form method="POST">
        <h3>Zakup</h3>
        <input type="hidden" name="action" value="zakup">
        <input name="name" placeholder="Produkt" required>
        <input type="number" step="0.01" name="price" placeholder="Cena" required>
        <input type="number" name="qty" placeholder="Ilość" required>
        <button>Kup</button>
    </form>

    <form method="POST">
        <h3>Sprzedaż</h3>
        <input type="hidden" name="action" value="sprzedaz">
        <input name="name" placeholder="Produkt" required>
        <input type="number" name="qty" placeholder="Ilość" required>
        <button>Sprzedaj</button>
    </form>

    <form method="POST">
        <h3>Zmiana salda</h3>
        <input type="hidden" name="action" value="saldo">
        <input type="number" step="0.01" name="value" placeholder="Kwota" required>
        <button>Zmień</button>
    </form>

</div>

<a href="/historia/" class="btn">Historia ↓</a>

</body>
</html>
