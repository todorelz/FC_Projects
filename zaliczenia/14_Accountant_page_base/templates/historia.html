<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Historia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Historia operacji</h1>


{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}


{% if historia %}
    <ul class="history">
        {% for h in historia %}
            <li>
                <strong>{{ h.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</strong>
                <br>
                {{ h.action }}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Brak historii</p>
{% endif %}


<div style="margin-top: 20px;">
    <a href="/" class="btn">← Powrót</a>
</div>

</body>
</html>
